<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulis Berita Baru - Admin Desa Meat</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-950 font-sans text-slate-100 flex min-h-screen">

<!-- Sidebar -->
<div th:replace="fragments/sidebar :: sidebar"></div>

<!-- Main -->
<div class="flex-1 flex flex-col min-w-0">

    <!-- Header -->
    <header class="h-16 border-b border-slate-800 bg-slate-900/60 backdrop-blur-sm px-8 flex items-center justify-between sticky top-0 z-40">
        <h1 class="font-bold text-sm text-white flex items-center gap-2">
            <i class="fa-solid fa-plus text-emerald-400"></i>
            <span>Tulis Berita Baru</span>
        </h1>

        <a href="/admin/berita"
           class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs px-4 py-2.5 rounded-xl border border-slate-700 flex items-center gap-1.5">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Kembali</span>
        </a>
    </header>

    <!-- Toast Success (Spring Flash Message) -->
    <div th:if="${successMessage}"
         class="mx-8 mt-6 bg-emerald-500/10 border border-emerald-500 text-emerald-300 px-4 py-3 rounded-xl">
        <i class="fa-solid fa-circle-check mr-2"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Form -->
    <div class="p-8 max-w-4xl">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-6">

            <div>
                <h3 class="font-bold text-base text-white">Formulir Pembuatan Berita</h3>
                <p class="text-xs text-slate-400">
                    Pastikan informasi berita akurat sebelum diterbitkan.
                </p>
            </div>

            <form th:action="@{/admin/berita/save}"
                  th:object="${post}"
                  method="post"
                  enctype="multipart/form-data"
                  class="space-y-6 text-xs text-slate-300">

                <input type="hidden" th:field="*{id}" />

                <!-- Judul -->
                <div>
                    <label class="font-bold text-slate-400">Judul Berita *</label>
                    <input type="text"
                           th:field="*{judul}"
                           required
                           class="w-full mt-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none"
                           placeholder="Ketik judul berita..." />
                </div>

                <!-- Kategori + Penulis -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="font-bold text-slate-400">Kategori</label>
                        <select th:field="*{kategori}"
                                class="w-full mt-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500">
                            <option value="INFORMASI">INFORMASI</option>
                            <option value="PEMERINTAHAN">PEMERINTAHAN</option>
                            <option value="EKONOMI">EKONOMI</option>
                            <option value="PARIWISATA">PARIWISATA</option>
                            <option value="KOMUNITAS">KOMUNITAS</option>
                        </select>
                    </div>

                    <div>
                        <label class="font-bold text-slate-400">Penulis</label>
                        <input type="text"
                               th:field="*{penulis}"
                               required
                               class="w-full mt-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500"
                               placeholder="Nama penulis..." />
                    </div>

                </div>

                <!-- Gambar -->
                <div>
                    <label class="font-bold text-slate-400">Pilih Gambar Berita</label>
                    <input type="file"
                           name="imageFile"
                           accept="image/*"
                           class="w-full mt-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500" />
                    <input type="hidden" th:field="*{gambar}" />
                </div>

                <!-- Konten -->
                <div>
                    <label class="font-bold text-slate-400">Isi Berita *</label>
                    <textarea th:field="*{konten}"
                              required
                              rows="10"
                              class="w-full mt-1 bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 resize-none"
                              placeholder="Tulis isi berita..."></textarea>
                </div>

                <!-- Button -->
                <div class="flex justify-end gap-3 pt-6 border-t border-slate-800">

                    <a href="/admin/berita"
                       class="bg-slate-800 hover:bg-slate-700 px-5 py-3 rounded-xl text-slate-300">
                        Batal
                    </a>

                    <button type="submit"
                            class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-xl text-white font-bold">
                        Terbitkan
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
