<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Aparatur - Desa Meat Balige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-indigo-950 flex items-center justify-center min-h-screen p-4">
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center opacity-10"></div>
    
    <div class="z-10 w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-6 shadow-2xl relative">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 rounded-2xl mx-auto flex items-center justify-center text-xl border border-emerald-500/15">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 class="font-display font-black text-white text-lg tracking-tight">Daftar Akun Baru Aparatur</h2>
            <p class="text-slate-400 text-xs">Registrasi akun sekretariat atau staf kelurahan Desa Meat.</p>
        </div>

        <div th:if="${error}" class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl text-xs mb-4">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/auth/register-process}" th:object="${registerRequest}" method="POST" class="space-y-4 text-xs text-slate-300">
            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Nama Lengkap Pemilik Akun</label>
                <input type="text" th:field="*{fullName}" placeholder="Ketik nama lengkap Anda..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
            </div>

            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Alamat Email Instansi</label>
                <input type="email" th:field="*{email}" placeholder="nama@desameatbalige.go.id" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
            </div>

            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Username</label>
                <input type="text" th:field="*{username}" placeholder="Pilih username unik..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
            </div>

            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Kata Sandi Rahasia</label>
                <input type="password" th:field="*{password}" placeholder="••••••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
            </div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-2xl transition-colors shadow-md text-xs mt-3">
                Buat Akun Staf
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="/auth/login" class="text-xs text-slate-400 hover:underline">Sudah punya akun? Masuk disini</a>
        </div>
    </div>
</body>
</html>
