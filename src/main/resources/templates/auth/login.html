<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator - Desa Meat Balige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-indigo-950 flex items-center justify-center min-h-screen p-4">
    <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1200&q=80')] bg-cover bg-center opacity-10"></div>
    
    <div class="z-10 w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-6 shadow-2xl relative">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-emerald-500/10 text-emerald-400 rounded-2xl mx-auto flex items-center justify-center text-xl border border-emerald-500/15">
                <i class="fa-solid fa-user-lock"></i>
            </div>
            <h2 class="font-display font-black text-white text-lg tracking-tight">Login Portal Aparatur Desa</h2>
            <p class="text-slate-400 text-xs">Silakan masuk menggunakan identitas resmi Anda.</p>
        </div>

        <!-- Notification error trigger -->
        <div th:if="${error != null}" class="bg-red-500/10 border border-red-500/20 text-red-300 p-4 rounded-xl text-xs flex items-center gap-2">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span th:text="${error}">Username atau Password salah!</span>
        </div>

        <form th:action="@{/auth/login-process}" method="post" th:object="${loginRequest}" class="space-y-4 text-xs text-slate-300">
            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Username Administrasi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4.5 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" th:field="*{username}" placeholder="Masukkan username resmi..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-11 pr-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="font-bold text-slate-400">Kata Sandi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4.5 text-slate-500">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" th:field="*{password}" placeholder="••••••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-11 pr-4 py-3 text-white focus:border-emerald-500 transition-all outline-none" required />
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-2xl transition-colors shadow-md text-xs mt-3">
                Masuk ke Dashboard
            </button>
        </form>

        <div class="text-center pt-2 space-y-2">
            <a href="/home" class="block text-xs text-emerald-400 hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Portal Warga</a>
            <p class="text-[10px] text-slate-500">Belum punya akun? <a href="/auth/register" class="text-emerald-500 hover:underline">Daftar Akun Baru</a></p>
        </div>
    </div>
</body>
</html>
