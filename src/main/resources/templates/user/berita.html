<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Kabar Berita')"></head>

<body class="bg-[#f8fafc] text-slate-800 font-sans">

<!-- Navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- HERO -->
<div class="bg-brand-navy text-white py-16 relative overflow-hidden">
    <div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=1500&q=80')] bg-cover bg-center"></div>

    <div class="relative max-w-7xl mx-auto px-4 text-center space-y-4">

        <h1 class="text-3xl md:text-4xl font-display font-black">
            Portal Kabar Berita & Pengumuman
        </h1>

        <p class="text-slate-300 max-w-lg mx-auto text-xs md:text-sm">
            Informasi resmi desa dan kegiatan terbaru.
        </p>

        <!-- SEARCH -->
        <form action="/berita" method="get" class="max-w-md mx-auto">
            <div class="flex bg-white rounded-2xl p-1.5 shadow-md">
                <input type="text"
                       name="query"
                       placeholder="Cari berita..."
                       th:value="${param.query}"
                       class="w-full text-xs px-3 py-2 text-slate-800 outline-none" />

                <button class="bg-emerald-500 text-white px-4 rounded-xl text-xs">
                    Cari
                </button>
            </div>
        </form>

    </div>
</div>

<!-- CONTENT -->
<div class="max-w-7xl mx-auto px-4 py-16">

    <!-- SEARCH INFO -->
    <div th:if="${param.query != null}" class="mb-6 text-xs text-slate-600">
        Hasil pencarian:
        <b th:text="${param.query}"></b>
        <a href="/berita" class="text-red-500 ml-2">Reset</a>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(posts)}"
         class="bg-white p-10 text-center rounded-2xl border shadow-sm">

        <i class="fa-solid fa-folder-open text-3xl text-slate-400"></i>

        <h3 class="font-bold mt-3">Tidak ada berita</h3>

        <p class="text-xs text-slate-500 mt-1">
            Data berita belum tersedia.
        </p>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <div th:each="berita : ${posts}"
             class="bg-white rounded-3xl overflow-hidden border shadow-sm flex flex-col">

            <!-- IMAGE -->
            <div class="h-48 overflow-hidden relative">
                <img th:src="${berita.gambar != null ? berita.gambar : 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09'}"
                     class="w-full h-full object-cover hover:scale-105 transition" />

                <span class="absolute top-4 left-4 bg-blue-500 text-white text-[10px] px-2 py-1 rounded-full">
                    <span th:text="${berita.kategori}">INFO</span>
                </span>
            </div>

            <!-- CONTENT -->
            <div class="p-6 flex flex-col gap-3">

                <!-- FIX ERROR UTAMA: pakai tanggal, bukan tanggalDraft -->
                <span class="text-[11px] text-slate-500"
                      th:text="${berita.tanggal}">
                </span>

                <h3 class="font-bold text-base line-clamp-2">
                    <a th:href="@{/berita/{id}(id=${berita.id})}"
                       th:text="${berita.judul}">
                    </a>
                </h3>

                <p class="text-xs text-slate-500 line-clamp-3"
                   th:text="${berita.konten}">
                </p>

                <a th:href="@{/berita/{id}(id=${berita.id})}"
                   class="text-xs text-blue-600 font-bold mt-auto">
                    Baca Selengkapnya →
                </a>

            </div>
        </div>

    </div>

</div>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
