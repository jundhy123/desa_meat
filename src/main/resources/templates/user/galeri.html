<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Galeri Foto Desa')"></head>
<body class="bg-[#f8fafc] text-slate-800 font-sans">

    <!-- Header Navbar -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <!-- Page Header Hero Banner -->
    <div class="bg-brand-navy text-white py-16 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=1500&q=80')] bg-cover bg-center"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-3">
            <span class="text-xs font-bold text-emerald-400 block tracking-widest uppercase">Dokumentasi Visual</span>
            <h1 class="text-3xl md:text-4xl font-display font-black">Galeri Foto & Momen Desa</h1>
            <p class="text-slate-400 max-w-lg mx-auto text-xs md:text-sm">
                Kumpulan momen berharga, keindahan alam, dan kegiatan masyarakat di Desa Meat Balige.
            </p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" th:if="${listGaleri != null and !listGaleri.isEmpty()}">
            <div th:each="g : ${listGaleri}" class="bg-white rounded-3xl overflow-hidden border border-slate-150 shadow-sm hover:shadow-md transition-all group cursor-pointer" onclick="openLightbox(this)">
                <div class="h-64 overflow-hidden bg-slate-100 relative">
                    <img th:src="${g.urlGambar}" th:alt="${g.judul}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500" />
                    <span class="absolute top-4 left-4 bg-emerald-500/90 backdrop-blur-sm text-white px-3 py-1 rounded-full text-[10px] font-bold" th:text="${g.kategori}">Kegiatan</span>
                </div>
                <div class="p-6">
                    <h3 class="font-display font-bold text-slate-900 text-sm mb-1" th:text="${g.judul}">Judul Foto</h3>
                    <p class="text-xs text-slate-500 line-clamp-2" th:text="${g.deskripsi}">Deskripsi singkat mengenai foto atau kegiatan yang didokumentasikan.</p>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${listGaleri == null or listGaleri.isEmpty()}" class="text-center py-20 bg-white rounded-3xl border border-slate-150 shadow-sm">
            <div class="w-20 h-20 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-solid fa-images"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-900">Belum Ada Foto</h3>
            <p class="text-sm text-slate-500">Koleksi foto desa sedang dalam proses dokumentasi.</p>
        </div>

    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-slate-950/95 hidden items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-2xl hover:text-emerald-400 transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="max-w-5xl w-full flex flex-col items-center gap-4" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="" class="max-h-[80vh] w-auto rounded-2xl shadow-2xl border border-white/10" />
            <div class="text-center text-white">
                <h3 id="lightboxTitle" class="text-lg font-bold"></h3>
                <p id="lightboxDesc" class="text-xs text-slate-400"></p>
            </div>
        </div>
    </div>

    <!-- Footer Segment -->
    <div th:replace="fragments/footer :: footer"></div>

    <script>
        function openLightbox(el) {
            const img = el.querySelector('img');
            const title = el.querySelector('h3').innerText;
            const desc = el.querySelector('p').innerText;

            document.getElementById('lightboxImg').src = img.src;
            document.getElementById('lightboxTitle').innerText = title;
            document.getElementById('lightboxDesc').innerText = desc;
            document.getElementById('lightbox').classList.remove('hidden');
            document.getElementById('lightbox').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
            document.getElementById('lightbox').classList.remove('flex');
            document.body.style.overflow = '';
        }
    </script>

</body>
</html>
