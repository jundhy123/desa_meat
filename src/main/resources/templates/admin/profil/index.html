<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Profil Desa - Admin Desa Meat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 font-sans text-slate-100 flex min-h-screen">

    <!-- Sidebar Integration -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Workspace Content -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-16 border-b border-slate-800 bg-slate-900/60 backdrop-blur-sm px-8 flex items-center justify-between sticky top-0 z-40">
            <h1 class="font-display font-bold text-sm tracking-tight text-white flex items-center gap-2">
                <i class="fa-solid fa-id-card text-emerald-400"></i>
                <span>Manajemen Profil & Sejarah Desa</span>
            </h1>
        </header>

        <!-- Main Workspace Body -->
        <div class="p-8 max-w-5xl space-y-6">

            <div th:if="${param.success}" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 p-4 rounded-2xl text-xs flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i>
                <span>Profil desa berhasil diperbarui secara sistematis.</span>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 space-y-8 shadow-sm">

                <form th:action="@{/admin/profil/save}" th:object="${profil}" method="post" enctype="multipart/form-data" class="space-y-6 text-xs text-slate-300">
                    <input type="hidden" th:field="*{id}" />

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Identitas Dasar -->
                        <div class="space-y-6">
                            <h3 class="text-white font-bold border-b border-slate-800 pb-2">Identitas Umum</h3>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Nama Desa</label>
                                <input type="text" th:field="*{namaDesa}" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" required />
                            </div>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Nama Kepala Desa</label>
                                <input type="text" th:field="*{kepalaDesa}" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" required />
                            </div>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Periode Jabatan</label>
                                <input type="text" th:field="*{periodeJabatan}" placeholder="Contoh: 2023 - 2029" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" />
                            </div>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Motto / Pesan Kepala Desa</label>
                                <textarea th:field="*{motto}" rows="3" placeholder="Ketik pesan atau motto kepala desa..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 outline-none resize-none"></textarea>
                            </div>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Foto Kepala Desa / Sampul Profil</label>
                                <input type="file" name="imageFile" accept="image/*" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" />
                                <input type="hidden" th:field="*{gambar}" />
                                <div th:if="*{gambar}" class="mt-3">
                                    <img th:src="*{gambar}" class="w-24 h-24 object-cover rounded-full border-2 border-slate-800" />
                                </div>
                            </div>
                        </div>

                        <!-- Visi & Misi -->
                        <div class="space-y-6">
                            <h3 class="text-white font-bold border-b border-slate-800 pb-2">Visi & Misi</h3>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Visi Desa</label>
                                <textarea th:field="*{visi}" rows="3" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 outline-none resize-none" required></textarea>
                            </div>

                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Misi Desa (Gunakan baris baru untuk setiap poin)</label>
                                <textarea th:field="*{misi}" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 outline-none resize-none" required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6 pt-4">
                        <h3 class="text-white font-bold border-b border-slate-800 pb-2">Detail Narasi & Geografis</h3>

                        <div class="space-y-1.5">
                            <label class="font-bold text-slate-400">Sejarah Lengkap Desa</label>
                            <textarea th:field="*{sejarah}" rows="8" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 outline-none resize-none" required></textarea>
                        </div>

                        <div class="space-y-1.5">
                            <label class="font-bold text-slate-400">Deskripsi Geografis & Wilayah</label>
                            <textarea th:field="*{deskripsiGeografis}" rows="5" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:border-emerald-500 outline-none resize-none" required></textarea>
                        </div>

                        <div class="space-y-1.5">
                            <label class="font-bold text-slate-400">Alamat Lengkap Kantor Desa</label>
                            <input type="text" th:field="*{alamat}" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" />
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Jam Kerja (Senin - Kamis)</label>
                                <input type="text" th:field="*{jamKerjaSeninKamis}" placeholder="Contoh: 08:00 - 16:00 WIB" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" />
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-400">Jam Kerja (Jumat)</label>
                                <input type="text" th:field="*{jamKerjaJumat}" placeholder="Contoh: 08:00 - 15:30 WIB" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:border-emerald-500 outline-none" />
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-end gap-3 pt-8 border-t border-slate-800">
                        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 font-bold text-white px-8 py-3.5 rounded-2xl transition-all shadow-md">
                            Simpan Perubahan Profil
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
